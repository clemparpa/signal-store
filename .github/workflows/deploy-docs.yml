name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/*/src/**'
      - 'packages/*/package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the publishable packages first so that starlight-typedoc can
      # resolve cross-package imports (e.g. entities → @fluch/signal-store)
      # via each package's dist/index.d.ts.
      - run: pnpm --filter './packages/*' run build

      - run: pnpm --filter @fluch/docs build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
